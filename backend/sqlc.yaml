version: "2"
sql:
  # Tenant-scoped queries (products, batches, customers, orders, reports)
  - engine: "postgresql"
    queries: "internal/queries/"
    schema:
      - "internal/migrations/public/"
      - "internal/migrations/tenant/"
    gen:
      go:
        package: "generated"
        out: "internal/generated"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_result_struct_pointers: false
